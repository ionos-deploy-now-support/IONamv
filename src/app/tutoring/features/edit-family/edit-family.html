<div class="page-center">
  <h1>
    @if (!!family()) {
      Modifier la famille {{ family()?.name }}
    } @else {
      Ajouter une famille
    }
  </h1>
  <form class="simple-form" (ngSubmit)="register()" [formGroup]="familyForm">
    <div class="field">
      <label for="fn">Nom *</label><input id="fn" type="text" formControlName="name" />
    </div>
    @if (nameCtrl.dirty && nameCtrl.hasError('required')) {
      <div class="field-error">Le nom est obligatoire</div>
    }
    <div class="buttons">
      <button [disabled]="familyForm.invalid">Enregistrer</button>
      <button class="secondary" type="button" (click)="cancel()">Annuler</button>
    </div>
  </form>
</div>
